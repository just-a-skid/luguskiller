<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Lugus Killer</title>
<style>
  body {
    margin: 0;
    font-family: 'Arial', sans-serif;
    background: linear-gradient(135deg, #ffffff, #808080));
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    height: 100vh;
    color: #000;
  }
  h1 {
    font-size: 3em;
    margin-bottom: 20px;
    text-shadow: 2px 2px #333;
  }
  button {
    padding: 15px 30px;
    font-size: 1.5em;
    border: none;
    border-radius: 15px;
    cursor: pointer;
    background: #FFCB05;
    color: #2A75BB;
    font-weight: bold;
    box-shadow: 3px 3px #333;
    transition: transform 0.1s;
  }
  button:hover {
    transform: scale(1.05);
  }
  p {
    margin-top: 20px;
    font-size: 0.9em;
  }
</style>
</head>
<body>
  <h1>Leaf Browser v2.0</h1>
  <button id="launchBtn">Muerte al lugus</button>
  <p>Muerte al lugus de mierda</p>

<script>
  // URL codificada en Base64
  const encodedURL = "aHR0cHM6Ly9kZXYuZGVzbW9zLmxpdmUuY2RuLmNsb3VkZmxhcmUubmV0LyY=";

  const launchBtn = document.getElementById('launchBtn');
  launchBtn.addEventListener('click', () => {
    const url = atob(encodedURL); // decodifica la URL
    // Abre en nueva ventana tipo app
    window.open(url, "_blank", "width=1024,height=768,toolbar=no,menubar=no,status=no");
  });
</script>
</body>
</html>
